<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Browser Mode Panel</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="sidepanel">
    <main>
      <header class="top">
        <h1>OpenClaw Browser Mode <span class="badge-v4">v4 panel</span></h1>
        <div id="statusPill" class="pill">Checking…</div>
      </header>

      <section class="card">
        <div class="label">Current tab</div>
        <div id="tabMeta" class="muted">No tab selected</div>
        <div id="contextMeta" class="tiny muted mt6">No saved tab context yet.</div>
        <div class="actions-row mt8">
          <button id="attachBtn" class="primary" type="button">Attach</button>
          <button id="detachBtn" type="button">Detach</button>
        </div>
      </section>

      <section class="card">
        <div class="label">Assist</div>
        <div class="grid-actions triple">
          <button id="snapshotBtn" type="button">Snapshot</button>
          <button id="understandBtn" type="button">Understand</button>
          <button id="suggestBtn" type="button">Suggest</button>
        </div>
      </section>

      <section class="card">
        <label for="commandInput">Command / plan</label>
        <div class="command-row">
          <input id="commandInput" type="text" placeholder="search pricing then open new tab" />
          <button id="voiceBtn" type="button" title="Voice input">🎙️</button>
        </div>
        <div id="voiceHint" class="muted tiny">Voice input: checking browser support…</div>
        <div class="actions-row three mt8">
          <button id="previewPlanBtn" type="button">Dry-run preview</button>
          <button id="runCommandBtn" class="primary" type="button">Run</button>
          <button id="runConfirmedBtn" type="button">Confirm + run</button>
        </div>
        <div id="planPreview" class="list mt8"></div>
      </section>

      <section class="card">
        <div class="label">Suggested next steps</div>
        <div id="suggestionsList" class="list"></div>
      </section>

      <section class="card">
        <div class="label history-head">Action log <button id="clearHistoryBtn" class="link-btn" type="button">Clear</button></div>
        <div id="historyList" class="history-list"></div>
      </section>

      <section class="card">
        <label for="endpointInput">Relay endpoint</label>
        <input id="endpointInput" type="text" placeholder="http://127.0.0.1:7331" />
        <div class="actions-row mt8">
          <button id="saveEndpointBtn" type="button">Save</button>
          <button id="pingBtn" type="button">Ping</button>
        </div>
      </section>

      <section class="card">
        <div class="label">Output</div>
        <pre id="outputText">Ready.</pre>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
