<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Browser Relay</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header class="top">
        <h1>OpenClaw Relay <span class="badge-v3">v3</span></h1>
        <div id="statusPill" class="pill">Checking…</div>
      </header>

      <section class="card">
        <div class="label">Current tab</div>
        <div id="tabMeta" class="muted">No tab selected</div>
        <div class="actions-row mt8">
          <button id="attachBtn" class="primary" type="button">Attach current tab</button>
          <button id="detachBtn" type="button">Detach</button>
        </div>
      </section>

      <section class="card">
        <div class="label">Assist</div>
        <div class="grid-actions">
          <button id="snapshotBtn" type="button">Snapshot page</button>
          <button id="understandBtn" type="button">Understand page</button>
          <button id="suggestBtn" type="button">Auto-help suggestions</button>
        </div>
      </section>

      <section class="card">
        <div class="label">Safe autopilot</div>
        <button id="autopilotBtn" class="primary" type="button">Run safe autopilot</button>
        <p class="hint">Runs low-risk steps automatically. Risky actions are listed and need explicit confirmation.</p>
        <div id="riskyList" class="risky-list"></div>
      </section>

      <section class="card">
        <label for="commandInput">Run action command</label>
        <div class="command-row">
          <input id="commandInput" type="text" placeholder="e.g. click sign in / type email = me@x.com / go to example.com" />
          <button id="voiceBtn" type="button" title="Voice input">🎙️</button>
        </div>
        <div id="voiceHint" class="muted tiny">Voice input: checking browser support…</div>
        <button id="runCommandBtn" type="button">Run command</button>
      </section>

      <section class="card">
        <label for="endpointInput">Relay endpoint</label>
        <input id="endpointInput" type="text" placeholder="http://127.0.0.1:7331" />
        <div class="actions-row">
          <button id="saveEndpointBtn" type="button">Save</button>
          <button id="pingBtn" type="button">Ping</button>
        </div>
      </section>

      <section class="card">
        <div class="label history-head">
          Action history
          <button id="clearHistoryBtn" class="link-btn" type="button">Clear</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>

      <section class="card">
        <div class="label">Output</div>
        <pre id="outputText">Ready.</pre>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
